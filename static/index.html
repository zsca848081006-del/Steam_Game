<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Steam 群体多人游戏推荐</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <header class="command-header">
      <div>
        <span class="system-label">Steam Signal Lab</span>
        <h1>一起找下个开黑游戏</h1>
        <p>选队友，点生成。系统会读取公开库存、时长和心愿单，给出适合这桌人的多人游戏。</p>
      </div>
    </header>

    <section class="dashboard-grid">
      <div class="panel input-panel">
        <div class="section-head compact">
          <h2>组队</h2>
          <span class="pill">Key 可选</span>
        </div>

        <label>
          <span>从好友列表选队友</span>
          <div class="friend-fetch-row">
            <input id="friendSelf" type="text" autocomplete="off" placeholder="你自己的 SteamID64 或主页链接">
            <button id="fetchFriends" type="button" class="secondary-button">拉取好友</button>
          </div>
          <small id="friendsHint" class="field-help">拉取后点头像勾选；列表私密时可手动粘贴链接。</small>
        </label>
        <div id="friendsList" class="friends-grid"></div>

        <label>
          <span>队友列表</span>
          <textarea id="steamIds" rows="5" placeholder="每行一个 SteamID64 或个人主页链接"></textarea>
        </label>

        <details class="advanced-panel">
          <summary>高级设置</summary>
          <div class="advanced-content">
            <div class="row">
              <label>
                <span>Steam Key</span>
                <input id="steamKey" type="password" autocomplete="off" placeholder="留空用公共 key">
                <small class="field-help"><a href="https://steamcommunity.com/dev/apikey" target="_blank" rel="noreferrer">申请 Steam Key</a>，仅随本次请求转发。</small>
              </label>
              <label>
                <span>DeepSeek Key</span>
                <input id="deepseekKey" type="password" autocomplete="off" placeholder="不填则跳过 AI 精排">
                <small class="field-help"><a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noreferrer">创建 DeepSeek Key</a>，使用你自己的额度。</small>
              </label>
            </div>

            <div class="option-grid">
              <label>
                <span>开黑人数</span>
                <input id="requiredPlayers" type="number" min="2" max="16" placeholder="可选">
              </label>
              <label class="check">
                <input id="includeFresh" type="checkbox">
                <span>包含尝鲜档</span>
              </label>
              <label class="check">
                <input id="excludeOwned" type="checkbox" checked>
                <span>只推全员未拥有</span>
              </label>
            </div>

            <div class="row">
              <label>
                <span>加权标签</span>
                <input id="boostTags" list="tagSuggestions" placeholder="生存,合作射击">
                <div id="boostTagHints" class="tag-hints"></div>
              </label>
              <label>
                <span>降权标签</span>
                <input id="passTags" list="tagSuggestions" placeholder="竞技,格斗">
                <div id="passTagHints" class="tag-hints"></div>
              </label>
            </div>
          </div>
        </details>
        <datalist id="tagSuggestions"></datalist>

        <div class="action-row">
          <button id="runButton" type="button">生成推荐</button>
          <p id="status" class="status"></p>
        </div>
      </div>

      <div class="panel taste-panel">
        <div class="section-head compact">
          <h2>共同口味</h2>
          <span id="distribution" class="pill">等待计算</span>
        </div>
        <div id="tags" class="tags empty-state">生成后显示这桌人的主要口味。</div>
      </div>
    </section>

    <section class="results">
      <div class="section-head">
        <h2>主线档</h2>
      </div>
      <div id="recommendations" class="cards"></div>
    </section>

    <section class="results">
      <div class="section-head">
        <h2>尝鲜档</h2>
      </div>
      <div id="freshRecommendations" class="cards"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
