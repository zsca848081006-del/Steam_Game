# kaluli.xin -> steam-group-rec (127.0.0.1:8673)
# 证书由 certbot (authenticator/installer = nginx) 管理，续期依赖本文件里的 server_name。
server {
    listen 80;
    server_name kaluli.xin www.kaluli.xin;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kaluli.xin www.kaluli.xin;

    ssl_certificate /etc/letsencrypt/live/kaluli.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaluli.xin/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8673;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 冷缓存首次推荐请求可能超过 1 分钟
        proxy_read_timeout 300s;
    }
}
